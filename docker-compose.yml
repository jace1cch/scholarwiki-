services:
  seekdb:
    image: oceanbase/seekdb:latest
    container_name: scholarwiki-seekdb
    ports:
      - "2881:2881"
    environment:
      - ROOT_PASSWORD=PaiSmart2025
      - MODE=slim
      - SEEKDB_DATABASE=paismart
      - INIT_SCRIPTS_PATH=/init-scripts
    volumes:
      - seekdb-data:/var/lib/oceanbase
      - ./src/main/resources/init-scripts:/init-scripts
    healthcheck:
      test: ["CMD", "mysql", "-h", "localhost", "-P", "2881", "-u", "root", "-pPaiSmart2025", "-e", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 20

  redis:
    image: redis:7.0
    container_name: scholarwiki-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass PaiSmart2025
    volumes:
      - redis-data:/data

  kafka:
    image: apache/kafka:3.8.0
    container_name: scholarwiki-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - CLUSTER_ID=scholarwiki-cluster
    volumes:
      - kafka-data:/var/lib/kafka/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: scholarwiki-minio
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=PaiSmart2025
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

volumes:
  seekdb-data:
  redis-data:
  kafka-data:
  minio-data:
