services:
  mysql:
    image: mysql:8.0
    container_name: scholarwiki-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=PaiSmart2025
      - MYSQL_DATABASE=paismart
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=512M
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pPaiSmart2025"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0
    container_name: scholarwiki-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass PaiSmart2025
    volumes:
      - redis-data:/data

  kafka:
    image: bitnamilegacy/kafka:3.2.1
    container_name: scholarwiki-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@127.0.0.1:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://127.0.0.1:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_BROKER_ID=1
      - KAFKA_KRAFT_CLUSTER_ID=0Zhd_N-0Saa7gdIuOytIOA
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka-data:/bitnami/kafka

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: scholarwiki-minio
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=PaiSmart2025
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  minio-data:
