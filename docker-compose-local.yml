services:
  mysql:
    image: mysql:8.0
    container_name: scholarwiki-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=PaiSmart2025
      - MYSQL_DATABASE=paismart
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-buffer-pool-size=512M
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pPaiSmart2025"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.0
    container_name: scholarwiki-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass PaiSmart2025
    volumes:
      - redis-data:/data

volumes:
  mysql-data:
  redis-data:
